services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klxm_installer_app
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:11.4
    container_name: klxm_installer_db
    environment:
      MARIADB_DATABASE: klxm_installer_proxy
      MARIADB_USER: klxm
      MARIADB_PASSWORD: klxm
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
